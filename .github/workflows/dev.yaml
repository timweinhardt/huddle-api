name: Deploy to Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  LAMBDA_KEY: lambda_package.zip

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install Lambda Dependencies
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package

      - name: Bundle Lambda Function
        run: |
          cp src/* package/
          cd package
          zip -r ../${{ env.LAMBDA_KEY }} .

      - name: Upload to S3
        run: |
          aws s3 cp ${{ env.LAMBDA_KEY }} s3://${{ vars.AWS_LAMBDA_BUCKET_NAME }}/${{ env.LAMBDA_KEY }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file aws/cloudformation.yaml \
            --stack-name ${{ vars.AWS_CF_STACK_NAME }} \
            --parameter-overrides \
              LambdaS3Bucket=${{ vars.AWS_LAMBDA_BUCKET_NAME }} \
              LambdaS3Key=${{ env.LAMBDA_KEY }} \
              Environment="dev" \
            --capabilities CAPABILITY_NAMED_IAM